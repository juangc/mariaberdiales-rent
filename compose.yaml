services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/app.sqlite
      STORAGE_DIR: /app/private-storage
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
    secrets:
      - admin_password
    volumes:
      - app_data:/app/data
      - documents:/app/private-storage

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

secrets:
  admin_password:
    file: ./secrets/admin_password.txt

volumes:
  app_data:
  documents:
  caddy_data:
  caddy_config:
